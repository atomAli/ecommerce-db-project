<!DOCTYPE html>
<html>
<head>
    <title>E-R Diagram - E-commerce Database</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1 { text-align: center; color: #333; }
        .diagram { background: white; padding: 20px; border: 1px solid #ccc; margin: 20px auto; max-width: 1000px; }
        svg { width: 100%; height: auto; }
        .entity { fill: #fff; stroke: #333; stroke-width: 2; }
        .entity-name { font-weight: bold; font-size: 14px; }
        .attribute { font-size: 11px; }
        .pk { font-weight: bold; text-decoration: underline; }
        .relation { stroke: #333; stroke-width: 2; fill: none; }
        .cardinality { font-size: 12px; font-weight: bold; }
        .nm { stroke: #0066cc; stroke-width: 3; }
    </style>
</head>
<body>
    <h1>E-R Diagram - E-commerce Database</h1>
    <div class="diagram">
        <svg viewBox="0 0 900 550">
            <!-- Customer Entity -->
            <rect x="50" y="150" width="120" height="150" class="entity"/>
            <text x="110" y="170" text-anchor="middle" class="entity-name">Customer</text>
            <line x1="50" y1="180" x2="170" y2="180" stroke="#333"/>
            <text x="60" y="198" class="pk">customer_id (PK)</text>
            <text x="60" y="215" class="attribute">name</text>
            <text x="60" y="230" class="attribute">email (UNIQUE)</text>
            <text x="60" y="245" class="attribute">password_hash</text>
            <text x="60" y="260" class="attribute">registration_date</text>

            <!-- Category Entity -->
            <rect x="550" y="50" width="120" height="100" class="entity"/>
            <text x="610" y="70" text-anchor="middle" class="entity-name">Category</text>
            <line x1="550" y1="80" x2="670" y2="80" stroke="#333"/>
            <text x="560" y="98" class="pk">category_id (PK)</text>
            <text x="560" y="115" class="attribute">name</text>
            <text x="560" y="130" class="attribute">description</text>

            <!-- Product Entity -->
            <rect x="550" y="200" width="120" height="170" class="entity"/>
            <text x="610" y="220" text-anchor="middle" class="entity-name">Product</text>
            <line x1="550" y1="230" x2="670" y2="230" stroke="#333"/>
            <text x="560" y="248" class="pk">product_id (PK)</text>
            <text x="560" y="265" class="attribute">name</text>
            <text x="560" y="280" class="attribute">description</text>
            <text x="560" y="295" class="attribute">price</text>
            <text x="560" y="310" class="attribute">stock_quantity</text>
            <text x="560" y="325" class="attribute">category_id (FK)</text>
            <text x="560" y="340" class="attribute">created_at</text>

            <!-- Orders Entity -->
            <rect x="250" y="200" width="120" height="150" class="entity"/>
            <text x="310" y="220" text-anchor="middle" class="entity-name">Orders</text>
            <line x1="250" y1="230" x2="370" y2="230" stroke="#333"/>
            <text x="260" y="248" class="pk">order_id (PK)</text>
            <text x="260" y="265" class="attribute">customer_id (FK)</text>
            <text x="260" y="280" class="attribute">order_date</text>
            <text x="260" y="295" class="attribute">status</text>
            <text x="260" y="310" class="attribute">total_amount</text>

            <!-- OrderItem Entity -->
            <rect x="250" y="400" width="120" height="120" class="entity"/>
            <text x="310" y="420" text-anchor="middle" class="entity-name">OrderItem</text>
            <line x1="250" y1="430" x2="370" y2="430" stroke="#333"/>
            <text x="260" y="448" class="pk">order_item_id (PK)</text>
            <text x="260" y="465" class="attribute">order_id (FK)</text>
            <text x="260" y="480" class="attribute">product_id (FK)</text>
            <text x="260" y="495" class="attribute">quantity</text>
            <text x="260" y="510" class="attribute">unit_price</text>

            <!-- Payment Entity -->
            <rect x="450" y="200" width="120" height="130" class="entity"/>
            <text x="510" y="220" text-anchor="middle" class="entity-name">Payment</text>
            <line x1="450" y1="230" x2="570" y2="230" stroke="#333"/>
            <text x="460" y="248" class="pk">payment_id (PK)</text>
            <text x="460" y="265" class="attribute">order_id (FK, UNIQUE)</text>
            <text x="460" y="280" class="attribute">payment_date</text>
            <text x="460" y="295" class="attribute">amount</text>
            <text x="460" y="310" class="attribute">payment_method</text>
            <text x="460" y="325" class="attribute">status</text>

            <!-- Review Entity -->
            <rect x="700" y="300" width="120" height="130" class="entity"/>
            <text x="760" y="320" text-anchor="middle" class="entity-name">Review</text>
            <line x1="700" y1="330" x2="820" y2="330" stroke="#333"/>
            <text x="710" y="348" class="pk">review_id (PK)</text>
            <text x="710" y="365" class="attribute">product_id (FK)</text>
            <text x="710" y="380" class="attribute">customer_id (FK)</text>
            <text x="710" y="395" class="attribute">rating</text>
            <text x="710" y="410" class="attribute">comment</text>
            <text x="710" y="425" class="attribute">review_date</text>

            <!-- Tag Entity -->
            <rect x="750" y="50" width="100" height="80" class="entity"/>
            <text x="800" y="70" text-anchor="middle" class="entity-name">Tag</text>
            <line x1="750" y1="80" x2="850" y2="80" stroke="#333"/>
            <text x="760" y="98" class="pk">tag_id (PK)</text>
            <text x="760" y="115" class="attribute">name</text>

            <!-- Product_Tag Entity (Junction) -->
            <rect x="700" y="150" width="130" height="70" class="entity" fill="#e6f2ff"/>
            <text x="765" y="170" text-anchor="middle" class="entity-name">Product_Tag</text>
            <line x1="700" y1="180" x2="830" y2="180" stroke="#333"/>
            <text x="710" y="198" class="pk">product_id (PK, FK)</text>
            <text x="710" y="213" class="pk">tag_id (PK, FK)</text>

            <!-- Relations -->
            <!-- Customer to Orders (1:N) -->
            <line x1="170" y1="250" x2="250" y2="260" class="relation"/>
            <text x="200" y="270" class="cardinality">1 : N</text>

            <!-- Customer to Review (1:N) -->
            <line x1="170" y1="300" x2="700" y2="350" class="relation" stroke-dasharray="5,5"/>
            <text x="400" y="330" class="cardinality">1 : N</text>

            <!-- Category to Product (1:N) -->
            <line x1="610" y1="150" x2="610" y2="200" class="relation"/>
            <text x="620" y="185" class="cardinality">1 : N</text>

            <!-- Orders to OrderItem (1:N) -->
            <line x1="310" y1="350" x2="310" y2="400" class="relation"/>
            <text x="320" y="385" class="cardinality">1 : N</text>

            <!-- Product to OrderItem (1:N) -->
            <line x1="550" y1="320" x2="370" y2="430" class="relation"/>
            <text x="450" y="380" class="cardinality">1 : N</text>

            <!-- Product to Review (1:N) -->
            <line x1="670" y1="300" x2="700" y2="330" class="relation"/>
            <text x="685" y="320" class="cardinality">1 : N</text>

            <!-- Orders to Payment (1:1) -->
            <line x1="370" y1="270" x2="450" y2="260" class="relation"/>
            <text x="400" y="275" class="cardinality">1 : 1</text>

            <!-- Product to Product_Tag (1:N) -->
            <line x1="670" y1="260" x2="700" y2="190" class="relation nm"/>
            <text x="680" y="220" class="cardinality">N : M</text>

            <!-- Tag to Product_Tag (1:N) -->
            <line x1="800" y1="130" x2="800" y2="150" class="relation nm"/>
            <text x="810" y="145" class="cardinality">N : M</text>

            <!-- Legend -->
            <rect x="50" y="480" width="300" height="50" fill="white" stroke="#333"/>
            <text x="60" y="500" font-weight="bold">Legend:</text>
            <text x="60" y="515">Rectangle = Entity</text>
            <text x="180" y="500">1:N = One-to-Many</text>
            <text x="180" y="515">1:1 = One-to-One</text>
            <text x="300" y="500" fill="#0066cc" font-weight="bold">N:M = Many-to-Many</text>
        </svg>
    </div>
</body>
</html>
